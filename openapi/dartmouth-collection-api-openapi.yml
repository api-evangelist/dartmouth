openapi: 3.0.0
info:
  title: Hub Search Catalog Collection API
  description: 'Welcome to the Search API. This guide describes how to use the Search API to programmatically query, filter, and search a catalog. Use this explorer to test API endpoints and search the site''s catalog without needing to use the site''s client search interface. Common uses cases include rendering features on a map in other tools including ArcGIS Map Viewer, GIS desktop applications, OWSLib, and more.




    The Search API conforms to the new OGC API - Records specification. For further details including definitions and example use cases, see the <a href="https://doc.arcgis.com/en/hub/content/federate-data-with-external-catalogs.htm#GUID-EAF833F8-FADA-4EC7-A1CA-F704DC987362">web help</a>.'
  version: 1.0.0
  contact: {}
servers:
- url: https://hub.arcgis.com
  description: ArcGIS Hub Search API (used by Dartmouth Open Data portal data-dartmouth.opendata.arcgis.com)
tags:
- name: Collection
paths:
  /api/search/v1/collections:
    get:
      description: Lists the collections described in the site's catalog.
      operationId: CollectionController_getSiteCollections_api/search/v1
      parameters:
      - name: token
        required: false
        in: query
        description: ArcGIS token to use when accessing the underlying ArcGIS Item that represents the site.
        schema:
          type: string
      responses:
        '200':
          description: A data object containing a list of site catalog collections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionsResponseDto'
      summary: ''
      tags:
      - Collection
  /api/search/v1/collections/{collectionId}:
    get:
      description: Retrieves the collection from a site's catalog with a provided id/key
      operationId: CollectionController_getSiteCollectionFromId_api/search/v1
      parameters:
      - name: collectionId
        required: true
        in: path
        description: Key/id for the desired collection.
        schema:
          example: dataset
          type: string
      - name: token
        required: false
        in: query
        description: ArcGIS token to use when accessing the underlying ArcGIS Item that represents the site.
        schema:
          type: string
      responses:
        '200':
          description: A data object describing a site collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionWithLinksDto'
      summary: ''
      tags:
      - Collection
components:
  schemas:
