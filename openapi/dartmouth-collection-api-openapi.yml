          type: array
          minItems: 4
          items:
            type: number
        type:
          type: string
          description: Type of geometry filter, must be "Envelope"
          enum:
          - Envelope
        coordinates:
          description: Coordinates in either 2d bbox [xmin,ymin,xmax,ymax] or envelope [[xmin,ymax],[xmax,ymin]] formats
          anyOf:
          - type: array
            minItems: 4
            maxItems: 4
            items:
              type: number
          - type: array
            minItems: 2
            maxItems: 2
            items:
              type: array
              minItems: 2
              maxItems: 2
              items:
