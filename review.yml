reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      Dartmouth maintains a real, named developer platform (DartAPI at
      developer.dartmouth.edu) with documented resource APIs (People, Nextgen),
      but the portal home and docs pages redirect to Dartmouth CAS login (HTTP
      302) and API keys are manually issued, so no public unauthenticated API
      docs or endpoints were directly readable. Two genuinely reachable surfaces
      were verified live: the OpenAI-compatible Dartmouth Chat AI API
      (chat.dartmouth.edu/api, 200) documented via Research Computing and the
      langchain_dartmouth package/GitHub, and the public ArcGIS Hub open-data
      portal (data-dartmouth.opendata.arcgis.com, 200) served by the standard
      ArcGIS Hub Search API. GitHub orgs (dartmouth, dartmouth-dltg) are public
      and active. No endpoints were fabricated; gated/auth-only surfaces are
      flagged as such.
    endpoints:
